[package]
name = "ovim"
version = "0.1.0"
edition = "2021"

[dependencies]
ropey = "1.6"
ratatui = "0.29"
crossterm = "0.28"
anyhow = "1.0"
regex = "1.10"
axum = "0.7"
tokio = { version = "1.35", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4.4", features = ["derive"] }
tree-sitter = "0.20"
tree-sitter-rust = "0.20"
tree-sitter-javascript = "0.20"
tree-sitter-python = "0.20"
tree-sitter-highlight = "0.20"
lsp-types = "0.95"
url = "2.5"
mlua = { version = "0.9", features = ["luajit", "vendored", "async", "serialize"], optional = true }

[features]
default = []
lua = ["mlua"]

[dev-dependencies]
criterion = "0.5"
insta = "1.34"
reqwest = { version = "0.12.23", features = ["json"] }
