# ============================================================================
# Python
# ============================================================================

[[language]]
id = "python"
name = "Python"
extensions = ["py", "pyw", "pyi"]
filenames = ["pipfile"]

[language.syntax]
grammar = "tree-sitter-python"
official = { crate = "tree_sitter_python", constant = "HIGHLIGHTS_QUERY" }

[language.lsp]
# Try pyright first (current default in python.rs)
command = "pyright-langserver"
args = ["--stdio"]
fallback_commands = [
    "pylsp",
    "jedi-language-server",
    "~/.local/bin/pyright-langserver",
    "~/.local/bin/pylsp",
]
root_markers = ["pyproject.toml", "setup.py", "requirements.txt", ".git"]
install_hint = "Install with: pip install pyright (or: pip install python-lsp-server)"

# ============================================================================
# Java
# ============================================================================

[[language]]
id = "java"
name = "Java"
extensions = ["java"]

[language.syntax]
grammar = "tree-sitter-java"
official = { crate = "tree_sitter_java", constant = "HIGHLIGHTS_QUERY" }

# Note: Java has complex auto-download logic in src/lsp_init/java.rs
# This config is for reference. Phase 2 will continue using java.rs
# until the auto-download system is generalized in Phase 3+
[language.lsp]
command = "hyperion-lsp"
fallback_commands = [
    "~/Personal/hyperion-ls/target/release/hyperion-lsp",
    "~/Personal/hyperion-ls/target/debug/hyperion-lsp"
]
root_markers = ["settings.gradle", "settings.gradle.kts", "pom.xml", "build.gradle"]
install_hint = "Hyperion LSP auto-download is handled automatically by ovim"

# ============================================================================
# Markdown (Syntax only - no LSP needed for most use cases)
# ============================================================================

[[language]]
id = "markdown"
name = "Markdown"
extensions = ["md", "markdown", "mdown", "mkd", "mkdn", "mdx"]
filenames = ["readme", "changelog", "contributing", "license"]

[language.syntax]
grammar = "tree-sitter-md"
file = { path = "src/syntax/queries/markdown.scm" }

# No LSP configured - syntax highlighting only
# Users can add their own LSP in ~/.config/ovim/languages.toml if desired

