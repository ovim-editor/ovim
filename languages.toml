# ovim Language Configuration
#
# This file defines language support for syntax highlighting and LSP integration.
# It is embedded into the ovim binary at compile time using include_str!().
#
# User overrides: Create ~/.config/ovim/languages.toml to customize or add languages.
# User config merges with this embedded config:
#   - Same language ID → user config overrides
#   - New language ID → user config adds
#
# See: code-docs/LANGUAGE_SUPPORT_ARCHITECTURE_ANALYSIS.md for design details

# ============================================================================
# Rust
# ============================================================================

[[language]]
id = "rust"
name = "Rust"
extensions = ["rs"]

[language.syntax]
grammar = "tree-sitter-rust"
official = { crate = "tree_sitter_rust", constant = "HIGHLIGHTS_QUERY" }

[language.lsp]
command = "rust-analyzer"
fallback_commands = [
    "~/.cargo/bin/rust-analyzer",
    "~/.rustup/toolchains/stable-aarch64-apple-darwin/bin/rust-analyzer",
    "~/.rustup/toolchains/stable-x86_64-unknown-linux-gnu/bin/rust-analyzer",
    "~/.rustup/toolchains/stable-x86_64-apple-darwin/bin/rust-analyzer",
]
root_markers = ["Cargo.toml", "Cargo.lock"]
install_hint = "Install with: rustup component add rust-analyzer"

[language.lsp.auto_install]
method = { type = "shell", command = "rustup component add rust-analyzer" }

# ============================================================================
# TypeScript
# ============================================================================

[[language]]
id = "typescript"
name = "TypeScript"
extensions = ["ts", "mts", "cts"]

[language.syntax]
grammar = "tree-sitter-typescript"
official = { crate = "tree_sitter_typescript", constant = "HIGHLIGHTS_QUERY" }

[language.lsp]
command = "typescript-language-server"
args = ["--stdio"]
fallback_commands = [
    "node_modules/.bin/typescript-language-server",
    "~/.npm-global/bin/typescript-language-server",
    "~/.local/share/pnpm/typescript-language-server"
]
root_markers = ["package.json", "tsconfig.json", "jsconfig.json", "node_modules"]
install_hint = "Install with: npm install -g typescript-language-server typescript"

[language.lsp.auto_install]
method = { type = "npm", package = "typescript-language-server", global = true }

# ============================================================================
# TSX (TypeScript with JSX)
# ============================================================================

[[language]]
id = "tsx"
name = "TSX"
extensions = ["tsx"]

[language.syntax]
grammar = "tree-sitter-typescript"
# TSX uses LANGUAGE_TSX grammar variant (separate from LANGUAGE_TYPESCRIPT)
# but shares the same HIGHLIGHTS_QUERY as TypeScript
official = { crate = "tree_sitter_typescript", constant = "HIGHLIGHTS_QUERY" }

[language.lsp]
command = "typescript-language-server"
args = ["--stdio"]
fallback_commands = [
    "node_modules/.bin/typescript-language-server",
    "~/.npm-global/bin/typescript-language-server",
    "~/.local/share/pnpm/typescript-language-server"
]
root_markers = ["package.json", "tsconfig.json", "jsconfig.json", "node_modules"]
install_hint = "Install with: npm install -g typescript-language-server typescript"

[language.lsp.auto_install]
method = { type = "npm", package = "typescript-language-server", global = true }

