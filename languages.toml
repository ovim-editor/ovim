# ============================================================================
# Companion LSP Servers
# ============================================================================
# Companion servers provide additional LSP support alongside primary servers.
# They activate only when activation_markers are present in the project tree.

[[companion_lsp]]
id = "tailwindcss"
name = "Tailwind CSS"
command = "tailwindcss-language-server"
args = ["--stdio"]
applies_to = ["typescript", "typescriptreact", "javascript", "javascriptreact", "html", "css"]
root_markers = ["tailwind.config.js", "tailwind.config.ts", "tailwind.config.cjs", "tailwind.config.mjs", "package.json"]
activation_markers = ["tailwind.config.js", "tailwind.config.ts", "tailwind.config.cjs", "tailwind.config.mjs"]
install_hint = "Install with: npm install -g @tailwindcss/language-server"
