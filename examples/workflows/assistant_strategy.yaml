version: 1
name: assistant_strategy
description: Route tasks between direct execution and a complex execution workflow using ordered model preferences.

inputs:
  request:
    type: string
    required: false
    description: Task or question to execute.

steps:
  - id: complexity_judgment
    kind: prompt
    profiles:
      - "Claude GPT-5.3-Codex-Spark"
      - Sonnet
      - local
    prompt: |
      You are a routing assistant. Determine whether the task is complex.
      Return JSON only.
      Schema:
      {
        "is_complex": true | false,
        "confidence": 0.0 to 1.0,
        "reason": "brief rationale"
      }

      Task:
      {{ inputs.request | default("No request provided") }}
    output:
      format: json
      schema:
        type: object
        additionalProperties: false
        required:
          - is_complex
          - confidence
          - reason
        properties:
          is_complex:
            type: boolean
          confidence:
            type: number
          reason:
            type: string

  - id: requirement_gathering
    kind: prompt
    profiles:
      - "Claude Opus"
      - "GPT-5.3"
      - local
    prompt: |
      You are an exploration agent. You may use tools if useful.
      {% if steps.complexity_judgment.output.is_complex %}
      Task:
      {{ inputs.request | default("No request provided") }}

      Complexity signal:
      {{ steps.complexity_judgment.output.reason }}

      Return JSON only in this schema:
      {
        "skip": false,
        "required_information": [""],
        "open_questions": [""],
        "constraints": [""]
      }
      {% else %}
      {"skip": true, "required_information": [], "open_questions": [], "constraints": []}
      {% endif %}
    output:
      format: json
      schema:
        type: object
        additionalProperties: false
        required:
          - skip
          - required_information
          - open_questions
          - constraints
        properties:
          skip:
            type: boolean
          required_information:
            type: array
            items:
              type: string
          open_questions:
            type: array
            items:
              type: string
          constraints:
            type: array
            items:
              type: string

  - id: execution_plan
    kind: prompt
    profiles:
      - "Gemini 3.1 Pro"
      - "Claude Opus"
      - "GPT-5.3"
      - local
    prompt: |
      You are a planner. Do not execute, only plan.
      {% if steps.requirement_gathering.output.skip %}
      {"parallel_tracks": [], "dependency_order": []}
      {% else %}
      Task:
      {{ inputs.request | default("No request provided") }}

      Required information:
      {% for item in steps.requirement_gathering.output.required_information %}
      - {{ item }}
      {% endfor %}

      Open questions:
      {% for item in steps.requirement_gathering.output.open_questions %}
      - {{ item }}
      {% endfor %}

      Constraints:
      {% for item in steps.requirement_gathering.output.constraints %}
      - {{ item }}
      {% endfor %}

      Return JSON only in this schema:
      {
        "parallel_tracks": [
          {
            "track_id": "T1",
            "goal": "Track objective",
            "depends_on": [""],
            "tasks": [
              {
                "id": "task-1",
                "summary": "Task summary",
                "depends_on": [""]
              }
            ]
          }
        ],
        "dependency_order": [
          ["T1"]
        ]
      }
      {% endif %}
    output:
      format: json
      schema:
        type: object
        additionalProperties: false
        required:
          - parallel_tracks
          - dependency_order
        properties:
          parallel_tracks:
            type: array
            items:
              type: object
              additionalProperties: false
              required:
                - track_id
                - goal
                - depends_on
                - tasks
              properties:
                track_id:
                  type: string
                goal:
                  type: string
                depends_on:
                  type: array
                  items:
                    type: string
                tasks:
                  type: array
                  items:
                    type: object
                    additionalProperties: false
                    required:
                      - id
                      - summary
                      - depends_on
                    properties:
                      id:
                        type: string
                      summary:
                        type: string
                      depends_on:
                        type: array
                        items:
                          type: string
          dependency_order:
            type: array
            items:
              type: array
              items:
                type: string

  - id: execute_tracks
    kind: each
    items: steps.execution_plan.output.parallel_tracks
    as: track
    index: index
    step:
      kind: prompt
      profiles:
        - "GPT-5.3-Codex-Spark"
        - Sonnet
        - local
      prompt: |
        {% if steps.execution_plan.output.parallel_tracks | length == 0 %}
        {"track_id": "none", "index": 0, "status": "skipped", "result": "not complex"}
        {% else %}
        You are the execution agent for one dependency-ordered track.

        Task:
        {{ inputs.request | default("No request provided") }}

        Track ID: {{ track.track_id }}
        Track goal: {{ track.goal }}
        Track dependencies: {{ track.depends_on | join(', ') }}
        Track index: {{ index }}

        Tasks:
        {% for task in track.tasks %}
        - {{ task.id }}: {{ task.summary }} (depends_on: {{ task.depends_on | join(', ') }})
        {% endfor %}

        Return JSON only:
        {"track_id":"{{ track.track_id }}","index":{{ index }},"status":"done","result":"completed"}
        {% endif %}
      output:
        format: json
        schema:
          type: object
          additionalProperties: false
          required:
            - track_id
            - index
            - status
            - result
          properties:
            track_id:
              type: string
            index:
              type: integer
            status:
              type: string
            result:
              type: string

  - id: direct_execution
    kind: prompt
    profiles:
      - "GPT-5.3-Codex-Spark"
      - Sonnet
      - local
    prompt: |
      {% if steps.complexity_judgment.output.is_complex %}
      {"skipped": true, "status": "complex_route"}
      {% else %}
      You are a direct executor for non-complex tasks.

      Task:
      {{ inputs.request | default("No request provided") }}

      Execute this request directly and return JSON only:
      {"skipped": false, "status": "done", "result": "implemented"}
      {% endif %}
    output:
      format: json
      schema:
        type: object
        additionalProperties: false
        required:
          - skipped
          - status
          - result
        properties:
          skipped:
            type: boolean
          status:
            type: string
          result:
            type: string
